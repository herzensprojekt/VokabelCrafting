<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Vokabel-Crafting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --grass-a:#5b9c3f;
    --grass-b:#4d8636;
    --dirt-a:#8a5a34;
    --dirt-b:#6e4527;
    --stone:#8a8a8a;
    --panel:#c6c6c6;
    --panel-dark:#8b8b8b;
    --panel-light:#eaeaea;
    --sky-top:#7ec6ea;
    --sky-bot:#bfe6f5;
    --ink:#242017;
    --gold:#f2c94c;
    --danger:#c0392b;
    --ok:#3fa34d;
    --wood:#7a4a2b;
    --content-font:'Atkinson Hyperlegible', Arial, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow-x:hidden;}
  body{
    font-family:'VT323', monospace;
    font-size:22px;
    color:var(--ink);
    min-height:100vh;
    background:
      radial-gradient(circle at 88% 10%, #fff6b8 0 22px, rgba(255,246,184,0.5) 23px 30px, transparent 31px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.10) 0 18px, transparent 18px 36px),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0 6px, transparent 6px 12px),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0 6px, transparent 6px 12px),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 54%, var(--grass-a) 54%, var(--grass-b) 100%);
    background-attachment: fixed;
    display:flex;
    justify-content:center;
    padding:14px;
  }
  #app{ width:100%; max-width:480px; overflow-x:hidden; }
  h1,h2,h3{font-family:'Press Start 2P', monospace; margin:0; line-height:1.4;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    display:flex; align-items:center; justify-content:center;
    padding:20px; z-index:1000;
    animation: feedback-in .15s ease;
  }
  .modal-box{ max-width:340px; width:100%; margin:0; }
  .modal-box p{ margin:0 0 16px 0; text-align:center; font-family:var(--content-font); font-size:19px; }

  /* ---------- Title ---------- */
  .title-block{ text-align:center; margin-bottom:14px; }
  .title-block h1{
    font-size:16px; color:#fff; letter-spacing:1px;
    animation: title-glow 2.6s ease-in-out infinite;
  }
  @keyframes title-glow{
    0%,100%{ text-shadow: 3px 3px 0 #2b5c1f, -2px -2px 0 #2b5c1f, 2px -2px 0 #2b5c1f, -2px 2px 0 #2b5c1f, 0 0 6px rgba(255,255,255,0.15); }
    50%{ text-shadow: 3px 3px 0 #2b5c1f, -2px -2px 0 #2b5c1f, 2px -2px 0 #2b5c1f, -2px 2px 0 #2b5c1f, 0 0 18px rgba(255,244,168,0.95); }
  }
  .title-block p{ font-family:'VT323',monospace; font-size:16px; color:#2b5c1f; margin-top:6px; }

  /* ---------- Panels ---------- */
  .panel{
    background: var(--panel);
    border: 6px solid var(--panel-dark);
    box-shadow: inset 4px 4px 0 var(--panel-light), inset -4px -4px 0 #6f6f6f, 0 6px 0 rgba(0,0,0,0.35);
    padding:16px;
    margin-bottom:14px;
  }
  .dirt-panel{
    background: var(--dirt-a);
    border: 6px solid var(--dirt-b);
    box-shadow: inset 4px 4px 0 #a06f45, inset -4px -4px 0 #4d3018, 0 6px 0 rgba(0,0,0,0.35);
    color:#fff;
  }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:'Press Start 2P', monospace;
    font-size:12px; color:#fff;
    background: var(--ok);
    border:4px solid #2c7a37;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.35), inset -2px -2px 0 rgba(0,0,0,0.25), 0 4px 0 rgba(0,0,0,0.35);
    padding:14px 10px; width:100%; cursor:pointer; text-align:center; line-height:1.5;
    min-height:48px; touch-action:manipulation; position:relative; overflow:hidden;
  }
  .btn::after{
    content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(115deg, transparent, rgba(255,255,255,0.35), transparent);
    transform:skewX(-20deg); transition:left .5s ease; pointer-events:none;
  }
  .btn:hover::after{ left:130%; }
  .btn:active{ transform:translateY(3px); box-shadow:none; }
  .btn.secondary{ background:#5a7dab; border-color:#2c4f7a; }
  .btn.wood{ background:var(--wood); border-color:#4d2f1a; }
  .btn.danger{ background:var(--danger); border-color:#7a2015; }
  .btn.gold{ background:var(--gold); border-color:#b8901f; color:#4a3400; }
  .btn.small{ font-size:11px; padding:10px 8px; }
  .btn[disabled]{ opacity:0.4; pointer-events:none; }

  .row{ display:flex; gap:10px; }
  .row.wrap{ flex-wrap:wrap; }
  .col{ flex:1; min-width:0; }

  .mode-grid{ display:grid; grid-template-columns:1fr; gap:10px; margin-top:10px; }
  .mode-btn{
    font-family:'Press Start 2P', monospace; font-size:11px; text-align:left; padding:12px;
    color:#fff; background:#6d6d6d; border:4px solid #454545;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.25), inset -2px -2px 0 rgba(0,0,0,0.3);
    cursor:pointer;
  }
  .mode-btn.active{ background:var(--ok); border-color:#2c7a37; }
  .mode-btn small{ display:block; font-family:'VT323',monospace; font-size:15px; margin-top:6px; opacity:0.9; }

  /* ---------- Avatar picker (fixed overflow + more distinct designs) ---------- */
  .avatar-grid{
    display:grid;
    grid-template-columns:repeat(4, minmax(0,1fr));
    gap:8px;
    margin-top:10px;
  }
  .avatar-option{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    cursor:pointer; padding:6px 4px; border:3px solid transparent;
    min-width:0;
  }
  .avatar-option.selected{
    border-color:var(--gold);
    background:rgba(242,201,76,0.15);
    box-shadow:0 0 12px rgba(242,201,76,0.7);
  }
  .avatar-option .aname{
    font-family:'Press Start 2P',monospace; font-size:7.5px; text-align:center;
    color:#2b2b2b; line-height:1.35; overflow-wrap:break-word; word-break:break-word; max-width:100%;
  }
  .avatar-swatch{
    position:relative;
    width:100%; max-width:56px; aspect-ratio:1/1; margin:0 auto;
    border:4px solid #2b2b2b;
    box-shadow: inset -4px -4px 0 rgba(0,0,0,0.25), inset 4px 4px 0 rgba(255,255,255,0.3);
  }
  .avatar-swatch::before, .avatar-swatch::after{
    content:""; position:absolute; top:34%; width:16%; height:16%;
    background:var(--eye-color, #1a1a1a);
    box-shadow: 0 0 4px var(--eye-glow, transparent);
  }
  .avatar-swatch::before{ left:20%; }
  .avatar-swatch::after{ right:20%; }
  .avatar-swatch.mini{ width:28px; max-width:28px; border-width:3px; }
  @keyframes rainbow-shift{
    0%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } 100%{ background-position:0% 50%; }
  }
  @keyframes swatch-glow{
    0%,100%{ box-shadow: inset -4px -4px 0 rgba(0,0,0,0.25), inset 4px 4px 0 rgba(255,255,255,0.3), 0 0 4px var(--glow-color, transparent); }
    50%{ box-shadow: inset -4px -4px 0 rgba(0,0,0,0.25), inset 4px 4px 0 rgba(255,255,255,0.3), 0 0 16px var(--glow-color, transparent); }
  }
  .player-badge{
    display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:10px;
    font-family:'Press Start 2P',monospace; font-size:11px; color:#2b5c1f;
  }
  .player-badge .player-name{ color:#1e4515; }
  #player-name-input{
    width:100%; font-family:var(--content-font); font-size:20px; font-weight:700;
    padding:10px; border:4px solid #9a9a9a; background:#fff;
    box-shadow: inset 2px 2px 0 #ddd; margin-top:14px;
  }
  #player-name-input:focus{ outline:3px solid var(--gold); }

  /* ---------- Hearts / HUD ---------- */
  .hearts{ display:flex; gap:4px; justify-content:center; margin-bottom:8px; }
  .heart{ font-size:26px; filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.4)); display:inline-block; }
  .heart.lost{ opacity:0.25; filter: grayscale(1) drop-shadow(1px 1px 0 rgba(0,0,0,0.4)); }
  .heart.refill{ animation: heart-refill-pop 0.7s ease; }
  @keyframes heart-refill-pop{
    0%{ transform:scale(0.2) rotate(-25deg); filter:drop-shadow(0 0 0 rgba(255,90,90,0)); }
    45%{ transform:scale(1.6) rotate(12deg); filter:drop-shadow(0 0 14px rgba(255,90,90,0.95)); }
    75%{ transform:scale(0.9) rotate(-6deg); }
    100%{ transform:scale(1) rotate(0deg); filter:drop-shadow(1px 1px 0 rgba(0,0,0,0.4)); }
  }
  .heart-refill-note{
    margin-top:10px; padding:8px; text-align:center;
    font-family:var(--content-font); font-weight:700; font-size:17px;
    background:#ffe1e1; border:3px solid var(--danger); color:#7a201a;
    animation: reveal-in .35s ease;
  }

  .hud{ display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .score-badge{
    font-family:'Press Start 2P', monospace; font-size:11px;
    background:var(--gold); color:#4a3400; border:3px solid #b8901f; padding:6px 8px;
    animation: badge-glow 2.2s ease-in-out infinite;
  }
  @keyframes badge-glow{
    0%,100%{ box-shadow: 0 0 2px rgba(242,201,76,0.4); } 50%{ box-shadow: 0 0 10px rgba(242,201,76,0.9); }
  }
  .cancel-row{ display:flex; justify-content:flex-end; margin-bottom:8px; }
  .cancel-btn-inline{ width:auto; font-size:10px; padding:8px 12px; min-height:auto; }

  .progress-outer{ background:#4a4a4a; border:3px solid #2b2b2b; height:14px; margin-bottom:14px; }
  .progress-inner{ background:var(--ok); height:100%; width:0%; transition:width .3s; }

  /* ---------- Question card (readable content font) ---------- */
  .word-card{ text-align:center; padding:20px 10px; }
  .word-card .eyebrow{ font-family:'Press Start 2P',monospace; font-size:9px; color:#4a4a4a; letter-spacing:1px; margin-bottom:10px; }
  .word-card .term{
    font-family:var(--content-font); font-weight:700; font-size:26px; color:var(--ink);
    word-break:break-word; line-height:1.4;
  }

  .choices{ display:grid; grid-template-columns:1fr; gap:10px; margin-top:16px; }
  .choice-btn{
    font-family:var(--content-font); font-weight:700; font-size:20px;
    background:var(--panel-light); border:4px solid #9a9a9a;
    box-shadow: inset 2px 2px 0 #fff, inset -2px -2px 0 #b5b5b5, 0 3px 0 rgba(0,0,0,0.3);
    padding:12px 10px; cursor:pointer; text-align:center; min-height:52px;
  }
  .choice-btn:active{ transform:translateY(2px); box-shadow:none; }
  .choice-btn.correct{ background:#bdeec2; border-color:var(--ok); }
  .choice-btn.wrong{ background:#f0bcb6; border-color:var(--danger); }
  .choice-btn[disabled]{ pointer-events:none; }

  .type-area{ margin-top:18px; }
  input[type=text]{
    width:100%; font-family:var(--content-font); font-weight:700; font-size:24px;
    padding:12px; border:4px solid #9a9a9a; background:#fff; box-shadow: inset 2px 2px 0 #ddd;
  }
  input[type=text]:focus{ outline:3px solid var(--gold); }

  .feedback{
    margin-top:14px; padding:12px; font-family:var(--content-font); font-size:19px; font-weight:700;
    border:4px solid; display:none;
  }
  .feedback.show{ display:block; animation: feedback-in .25s ease; }
  @keyframes feedback-in{ 0%{ transform:translateY(-6px); opacity:0; } 100%{ transform:translateY(0); opacity:1; } }
  .feedback.good{ background:#d7f3da; border-color:var(--ok); color:#1e5c28; }
  .feedback.almost{ background:#fdf1c7; border-color:var(--gold); color:#6e5300; }
  .feedback.bad{ background:#f7d6d1; border-color:var(--danger); color:#7a201a; }

  .answer-reveal{
    margin-top:10px; padding:10px; background:#fff; border:3px solid var(--gold);
    font-family:var(--content-font); font-weight:700; font-size:19px; text-align:center;
    color:#4a3400; animation: reveal-in .35s ease;
  }
  @keyframes reveal-in{ 0%{ transform:scale(0.85); opacity:0; } 100%{ transform:scale(1); opacity:1; } }

  .item-pop{ display:inline-block; font-size:26px; margin-right:6px; animation: pop 0.5s ease; }
  @keyframes pop{
    0%{ transform:scale(0) rotate(-15deg); opacity:0;} 60%{ transform:scale(1.3) rotate(8deg); opacity:1;}
    100%{ transform:scale(1) rotate(0deg);}
  }

  /* ---------- Inventory / Shop ---------- */
  .inventory{ display:grid; grid-template-columns:repeat(auto-fill, minmax(74px,1fr)); gap:8px; margin-top:10px; }
  .slot{
    background:var(--panel-light); border:3px solid #9a9a9a;
    box-shadow: inset 2px 2px 0 #fff, inset -2px -2px 0 #b5b5b5, 0 3px 0 rgba(0,0,0,0.25);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; padding:8px 4px; min-width:0; animation: slot-in .3s ease;
  }
  @keyframes slot-in{ 0%{ transform:scale(0.6); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
  .slot-icon{ font-size:24px; line-height:1; filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.25)); }
  .slot-name{
    font-family:'Press Start 2P',monospace; font-size:7px; line-height:1.4; margin-top:6px;
    text-align:center; color:#3a3a3a; text-transform:uppercase;
  }
  .slot .count{
    position:absolute; top:-6px; right:-6px; font-family:'Press Start 2P',monospace; font-size:9px;
    color:#4a3400; background:var(--gold); border:2px solid #b8901f; padding:1px 4px;
  }
  .inventory-empty{ font-size:16px; color:#555; text-align:center; padding:14px 6px; border:3px dashed #9a9a9a; margin-top:10px; }

  .shop-grid{ display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; margin-top:10px; }
  .shop-item{
    background:var(--panel-light); border:3px solid #9a9a9a;
    box-shadow: inset 2px 2px 0 #fff, inset -2px -2px 0 #b5b5b5;
    padding:10px 6px; display:flex; flex-direction:column; align-items:center; gap:4px; min-width:0;
  }
  .shop-item .slot-icon{ font-size:28px; }
  .shop-item .price{
    font-family:'Press Start 2P',monospace; font-size:10px; color:#4a3400;
    background:var(--gold); border:2px solid #b8901f; padding:2px 6px; margin-top:2px;
  }
  .shop-item .btn{ margin-top:6px; font-size:10px; padding:8px 6px; min-height:auto; }
  .balance-bar{
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-family:'Press Start 2P',monospace; font-size:13px; color:#4a3400;
    background:var(--gold); border:3px solid #b8901f; padding:10px; margin-bottom:14px;
  }

  /* ---------- Certificate ---------- */
  .certificate{
    background:#fdf6e3; border:6px solid var(--gold);
    box-shadow: inset 0 0 0 4px #fff, 0 6px 0 rgba(0,0,0,0.3);
    padding:18px; color:#3a2a10;
  }
  .certificate h2{ font-size:14px; text-align:center; color:#7a5a10; margin-bottom:10px; }
  .certificate .quote{
    font-family:var(--content-font); font-weight:700; font-style:italic; text-align:center;
    font-size:18px; margin:12px 0; color:#5a3d0a;
  }
  .vocab-list{ max-height:220px; overflow-y:auto; margin-top:10px; border:3px solid #d9c99a; background:#fffaf0; padding:8px; }
  .vocab-row{
    display:flex; justify-content:space-between; gap:8px; font-family:var(--content-font); font-size:16px;
    padding:4px 2px; border-bottom:1px solid #ecdfc0;
  }
  .vocab-row:last-child{ border-bottom:none; }
  .vocab-row .mark{ flex:0 0 auto; }
  .mistake-row{ font-family:var(--content-font); font-size:16px; padding:6px 2px; border-bottom:1px solid #f0d3cf; }
  .mistake-row b{ color:#7a201a; }
  .stat-row{ display:flex; justify-content:space-around; text-align:center; margin:10px 0; font-family:'Press Start 2P',monospace; font-size:10px; }
  .stat-row div span{ display:block; font-family:var(--content-font); font-size:20px; margin-top:4px; }

  .center-text{ text-align:center; }
  .muted{ color:#555; font-size:16px; }
  footer.note{ text-align:center; font-size:14px; color:#2b5c1f; margin-top:6px; }

  select{
    font-family:'VT323',monospace; font-size:18px; padding:8px; border:3px solid #9a9a9a; width:100%; background:#fff;
  }

  @media (max-width:380px){
    .word-card .term{ font-size:21px; }
    body{ font-size:20px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>

   VOKABEL-DATEN  (Vokabeln 7 Juli)

const VOCAB = [

  {en:"size", de:"Größe", accepted:["größe","kleidergröße"], cat:CATEGORY_NAME},
  {en:"another", de:"andere", accepted:["andere","ein anderer","eine andere","ein anderes","noch ein","noch eine"], cat:CATEGORY_NAME},

  const styles = [`background:${av.bg}`];

  if(av.rainbow){ styles.push('background-size:400% 400%'); anims.push('rainbow-shift 3s linear infinite'); }
  if(av.glow){ styles.push(`--glow-color:${av.glow}`); anims.push('swatch-glow 2.2s ease-in-out infinite'); }

// Zeichnet den Avatar als Block mit Augen auf einen Canvas (fürs Zertifikat-Bild)
function drawAvatarOnCanvas(ctx, av, x, y, size){
  const grad = ctx.createLinearGradient(x, y, x+size, y+size);
  const stops = av.colors && av.colors.length ? av.colors : ["#6fae44","#3f7a28"];
  stops.forEach((c,i)=>{ grad.addColorStop(stops.length>1 ? i/(stops.length-1) : 0, c); });
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, size, size);
  ctx.lineWidth = Math.max(3, size*0.06);
  ctx.strokeStyle = "#2b2b2b";
  ctx.strokeRect(x, y, size, size);
  const eyeColor = av.eyeColor || "#1a1a1a";
  const eyeSize = size*0.16;
  const eyeY = y + size*0.34;
  ctx.fillStyle = eyeColor;
  ctx.fillRect(x + size*0.20, eyeY, eyeSize, eyeSize);
  ctx.fillRect(x + size*0.64, eyeY, eyeSize, eyeSize);
}

  const a = arr.slice();

    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];

/* ---------------------------------------------------
   FUZZY-MATCHING
--------------------------------------------------- */
function levenshtein(a,b){
  const m=a.length, n=b.length;
  const dp = Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i;
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      const cost = a[i-1]===b[j-1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
    }
  }
  return dp[m][n];
}
function normalize(s){
  return s.toLowerCase().trim().replace(/[.,!?;:'"…]/g,"").replace(/\s+/g," ");
}
function cleanEn(en){
  return en.replace(/\([^)]*\)/g,"").replace(/\s+/g," ").trim();
}
function getAnswerData(word){
  if(state.direction === "en-de"){
    return { promptText: word.en, answerDisplay: word.de, accepted: word.accepted, eyebrow: "ÜBERSETZE INS DEUTSCHE" };
  }
  const enBase = cleanEn(word.en);
  return { promptText: word.de, answerDisplay: enBase, accepted: [enBase], eyebrow: "ÜBERSETZE INS ENGLISCHE" };
}
function evaluateTyped(input, acceptedList, correctionDisplay){
  const norm = normalize(input);
  if(norm.length===0) return {result:"wrong", correction: correctionDisplay};
  let bestDist = Infinity, bestLen = 1;
  acceptedList.forEach(acc=>{
    const a = normalize(acc);
    const d = levenshtein(norm, a);
    if(d < bestDist){ bestDist = d; bestLen = a.length; }
  });
  if(bestDist === 0) return {result:"correct"};
  const threshold = Math.max(1, Math.round(bestLen * 0.3));
  if(bestDist <= threshold) return {result:"almost", correction: correctionDisplay};
  return {result:"wrong", correction: correctionDisplay};
}

function startGame(){
  state.playerName = (state.playerName||"").trim() || "Spieler";
  saveProgress();
  state.hearts = state.maxHearts;
  state.sessionCoins = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.sessionLog = [];
  buildQueue();
  state.screen = "quiz";
  nextQuestion();
}

function pickQuestionType(){
  if(state.mode==="mc") return "mc";
  if(state.mode==="type") return "type";
  return Math.random() < 0.5 ? "mc" : "type";
}

function nextQuestion(){
  if(state.currentIndex >= state.queue.length){
    endSession("finished");
    return;
  }
  state.screen = "quiz";
  state.currentQuestionType = pickQuestionType();
  state.answered = false;
  render();
}

function currentWord(){ return state.queue[state.currentIndex]; }

function buildChoices(word){
  const ans = getAnswerData(word);
  const valueFor = w => state.direction === "en-de" ? w.de : cleanEn(w.en);
  const seen = new Set([ans.answerDisplay]);
  const others = [];
  shuffle(VOCAB.filter(w=>w!==word)).forEach(w=>{
    if(others.length>=3) return;
    const val = valueFor(w);
    if(!seen.has(val)){ seen.add(val); others.push(val); }
  });
  return shuffle([ans.answerDisplay, ...others]);
}

function heartsInnerHtml(pulseIndex){
  let html = "";
  for(let i=0;i<state.maxHearts;i++){
    const filled = i<state.hearts;
    const pulse = (pulseIndex!==undefined && i===pulseIndex) ? " refill" : "";
    html += `<span class="heart${filled?'':' lost'}${filled?pulse:''}">${filled?'❤️':'🤍'}</span>`;
  }
  return html;
}
function heartsHtml(){
  return `<div class="hearts" id="hearts-row">${heartsInnerHtml()}</div>`;
}

// Füllt bei jeder 10. richtigen/fast-richtigen Antwort in Folge ein Herz auf (Animation inklusive)
function maybeRefillHeartOnStreak(){
  if(state.streak>0 && state.streak % 10 === 0 && state.hearts < state.maxHearts){
    state.hearts++;
    const row = document.getElementById('hearts-row');
    if(row){ row.innerHTML = heartsInnerHtml(state.hearts-1); }
    return true;
  }
  return false;
}

  document.getElementById('confirm-continue-btn').addEventListener('click', advanceAfterAnswer, { once:true });
}

function cancelGame(){
  showConfirmModal('Runde abbrechen und zum Menü zurückkehren?', ()=>{
    state.screen = "start";
    render();
  });
}

function advanceAfterAnswer(){
  state.currentIndex++;
  if(state.hearts <= 0){
    endSession("gameover");
    return;
  }
  if(state.currentIndex < state.queue.length && state.currentIndex % 10 === 0){
    showMilestone();
    return;
  }
  nextQuestion();
}

function showMilestone(){
  state.milestoneQuote = pickRandom(MINECRAFT_QUOTES);
  state.screen = "milestone";
  render();
}

function renderMilestone(){
  const total = state.queue.length;
  const done = state.currentIndex;
  const remaining = total - done;

  app.innerHTML = `
    ${renderHeader("Zwischenstand")}
    ${playerBadgeHtml()}
    ${heartsHtml()}
    <div class="panel dirt-panel center-text">
      <h2 style="font-size:14px;color:#fff;">⛏ ${done} VOKABELN GESCHAFFT!</h2>
      <p style="font-family:var(--content-font);font-weight:700;font-style:italic;font-size:19px;color:#fff;margin:14px 0;">
        "${state.milestoneQuote}"
      </p>
      <p style="font-family:var(--content-font);font-size:18px;color:#fff;">
        Noch <strong>${remaining}</strong> Vokabel${remaining===1?'':'n'} bis zum Ziel!
      </p>
    </div>
    <button class="btn" id="milestone-continue-btn">▶ WEITER</button>
  `;
  document.getElementById('milestone-continue-btn').addEventListener('click', ()=>{ nextQuestion(); });
}

function goOnAfterDelay(){
  setTimeout(advanceAfterAnswer, 1400);
}

function handleMcAnswer(btn, choice, word){
  if(state.answered) return;
  state.answered = true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.setAttribute('disabled','true'));

  const ans = getAnswerData(word);
  const isCorrect = choice === ans.answerDisplay;
  if(isCorrect){
    btn.classList.add('correct');
    const coins = 10;
    state.sessionCoins += coins;
    state.streak += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    const refilled = maybeRefillHeartOnStreak();
    showFeedback('good', `<span class="item-pop">🪙</span> Richtig! +${coins} Münzen.${refilled ? heartRefillNoteHtml() : ""}`);
    state.sessionLog.push({prompt:ans.promptText, correct:ans.answerDisplay, result:"correct"});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(decodeURIComponent(b.dataset.choice)===ans.answerDisplay) b.classList.add('correct');
    });
    state.streak = 0;
    loseHeart();
    showFeedback('bad', `Leider falsch. Ein Herz geht verloren.`, ans.answerDisplay);
    state.sessionLog.push({prompt:ans.promptText, correct:ans.answerDisplay, result:"wrong", userInput:choice});
  }
  goOnAfterDelay();
}

function handleTypedAnswer(value, word){
  if(state.answered) return;
  state.answered = true;
  document.getElementById('submit-btn').setAttribute('disabled','true');
  document.getElementById('type-input').setAttribute('disabled','true');

  const ans = getAnswerData(word);
  const evalResult = evaluateTyped(value, ans.accepted, ans.answerDisplay);

  if(evalResult.result === "correct"){
    const coins = 10;
    state.sessionCoins += coins;
    state.streak += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    const refilled = maybeRefillHeartOnStreak();
    showFeedback('good', `<span class="item-pop">🪙</span> Richtig! +${coins} Münzen.${refilled ? heartRefillNoteHtml() : ""}`);
    state.sessionLog.push({prompt:ans.promptText, correct:ans.answerDisplay, result:"correct", userInput:value});
  } else if(evalResult.result === "almost"){
    const coins = 6;
    state.sessionCoins += coins;
    state.streak += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    const refilled = maybeRefillHeartOnStreak();
    showFeedbackWithConfirm('almost', `<span class="item-pop">🪙</span> Fast richtig! +${coins} Münzen &ndash; kein Herz verloren.`, evalResult.correction, refilled ? heartRefillNoteHtml() : "");
    state.sessionLog.push({prompt:ans.promptText, correct:ans.answerDisplay, result:"almost", userInput:value});
    return; // Weiter geht's erst, wenn der Nutzer die richtige Antwort bestätigt hat
  } else {
    state.streak = 0;
    loseHeart();
    showFeedbackWithConfirm('bad', `Leider falsch. Ein Herz geht verloren.`, evalResult.correction);
    state.sessionLog.push({prompt:ans.promptText, correct:ans.answerDisplay, result:"wrong", userInput:value});
    return; // Weiter geht's erst, wenn der Nutzer die richtige Antwort bestätigt hat
  }
  goOnAfterDelay();
}

/* ---------------------------------------------------
   SESSIONSENDE -> ZERTIFIKAT
--------------------------------------------------- */
function endSession(reason){
  state.coins += state.sessionCoins;
  state.lastReason = reason;
  state.sessionQuote = pickRandom(MINECRAFT_QUOTES);
  saveProgress();
  state.screen = "certificate";
  render();
}

function buildCertificateText(){
  const name = state.playerName || "Spieler";
  const total = state.sessionLog.length;
  const correctCount = state.sessionLog.filter(l=>l.result==="correct").length;
  const quote = state.sessionQuote || pickRandom(MINECRAFT_QUOTES);
  return `🏆 Vokabel-Zertifikat 🏆\n${name} hat ${correctCount}/${total} Vokabeln aus "${CATEGORY_NAME}" gemeistert!\n🪙 ${state.sessionCoins} Münzen verdient (Kontostand: ${state.coins})\n"${quote}"\nGlückwunsch! 🎉`;
}

// Zeichnet Text mit automatischem Zeilenumbruch auf den Canvas, gibt die neue Y-Position zurück
function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight){
  const words = text.split(" ");
  let line = "";
  let curY = y;
  words.forEach(word=>{
    const test = line ? line + " " + word : word;
    if(ctx.measureText(test).width > maxWidth && line){
      ctx.fillText(line, x, curY);
      line = word;
      curY += lineHeight;
    } else {
      line = test;
    }
  });
  if(line){ ctx.fillText(line, x, curY); curY += lineHeight; }
  return curY;
}

function buildCertificateCanvas(){
  const total = state.sessionLog.length;
  const correctCount = state.sessionLog.filter(l=>l.result==="correct").length;
  const quote = state.sessionQuote || pickRandom(MINECRAFT_QUOTES);
  const name = state.playerName || "Spieler";
  const av = avatarById(state.avatarId);
  const won = state.lastReason === "finished";

  const W = 900, H = 1200;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Hintergrund: Himmel + Gras-Streifen, dann Zertifikats-Karte
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,"#7ec6ea");
  sky.addColorStop(1,"#bfe6f5");
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = "#4d8636";
  ctx.fillRect(0, H-60, W, 60);

  const pad = 40;
  ctx.fillStyle = "#fdf6e3";
  ctx.fillRect(pad, pad, W-pad*2, H-pad*2-40);
  ctx.lineWidth = 14;
  ctx.strokeStyle = "#f2c94c";
  ctx.strokeRect(pad, pad, W-pad*2, H-pad*2-40);

  ctx.textAlign = "center";
  ctx.fillStyle = "#7a5a10";
  ctx.font = "bold 40px 'Atkinson Hyperlegible', Arial, sans-serif";
  ctx.fillText(won ? "🏆 VOKABEL-ZERTIFIKAT 🏆" : "📜 VOKABEL-URKUNDE", W/2, pad+80);

  // Avatar
  const avSize = 140;
  drawAvatarOnCanvas(ctx, av, W/2 - avSize/2, pad+110, avSize);

  ctx.fillStyle = "#3a2a10";
  ctx.font = "bold 34px 'Atkinson Hyperlegible', Arial, sans-serif";
  ctx.fillText(name, W/2, pad+290);

  ctx.font = "24px 'Atkinson Hyperlegible', Arial, sans-serif";
  ctx.fillStyle = "#5a3d0a";
  ctx.fillText(`Kategorie: ${CATEGORY_NAME}`, W/2, pad+330);

  // Statistiken
  ctx.font = "bold 30px 'Atkinson Hyperlegible', Arial, sans-serif";
  ctx.fillStyle = "#3a2a10";
  const statY = pad+400;
  ctx.fillText(`✅ ${correctCount} / ${total} Vokabeln gemeistert`, W/2, statY);
  ctx.fillText(`🪙 ${state.sessionCoins} Münzen verdient`, W/2, statY+50);
  ctx.fillText(`Kontostand: ${state.coins} Münzen`, W/2, statY+100);

  // Zitat
  ctx.font = "italic bold 28px 'Atkinson Hyperlegible', Arial, sans-serif";
  ctx.fillStyle = "#7a5a10";
  wrapCanvasText(ctx, `"${quote}"`, W/2, statY+190, W-pad*2-80, 38);

  ctx.font = "22px 'Atkinson Hyperlegible', Arial, sans-serif";
  ctx.fillStyle = "#5a3d0a";
  ctx.fillText("Herzensprojekt · Vokabel-Crafting", W/2, H-pad-70);

  return canvas;
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

function shareCertificateWhatsApp(){
  let canvas;
  try{
    canvas = buildCertificateCanvas();
  }catch(e){
    // Falls Canvas aus irgendeinem Grund fehlschlägt: Text-Fallback
    const text = buildCertificateText();
    window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
    return;
  }
  canvas.toBlob(blob=>{
    if(!blob){ return; }
    const file = new File([blob], "vokabel-zertifikat.png", {type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({ files:[file], title:"Vokabel-Zertifikat", text: buildCertificateText() }).catch(()=>{});
    } else {
      downloadBlob(blob, "vokabel-zertifikat.png");
      showConfirmModal("Das Zertifikat-Bild wurde heruntergeladen. Jetzt WhatsApp öffnen, um es dort im Chat anzuhängen?", ()=>{
        window.open("https://wa.me/?text=" + encodeURIComponent(buildCertificateText()), "_blank");
      });
    }
  }, "image/png");
}

function renderCertificate(){
  const total = state.sessionLog.length;
  const correctCount = state.sessionLog.filter(l=>l.result==="correct").length;
  const almostCount = state.sessionLog.filter(l=>l.result==="almost").length;
  const wrongCount = state.sessionLog.filter(l=>l.result==="wrong").length;
  const mistakes = state.sessionLog.filter(l=>l.result!=="correct");
  const quote = state.sessionQuote || pickRandom(MINECRAFT_QUOTES);
  const won = state.lastReason === "finished";

  app.innerHTML = `
    ${renderHeader(won ? "Übung abgeschlossen!" : "Übung beendet")}
    ${playerBadgeHtml()}

    <div class="certificate">
      <h2>${won ? "🏆 URKUNDE DER VOKABEL-MEISTERSCHAFT" : "📜 URKUNDE DER ÜBUNG"}</h2>
      <p style="text-align:center;font-family:var(--content-font);font-size:17px;margin:8px 0;">
        ${won ? `Herzlichen Glückwunsch, <strong>${escapeHtml(state.playerName||"Spieler")}</strong>!` : `Gut geübt, <strong>${escapeHtml(state.playerName||"Spieler")}</strong> &ndash; weiter so!`}
        <br>Kategorie: ${CATEGORY_NAME}
      </p>

      <div class="stat-row">
        <div>✅<span>${correctCount}</span></div>
        <div>🟡<span>${almostCount}</span></div>
        <div>❌<span>${wrongCount}</span></div>
        <div>🪙<span>${state.sessionCoins}</span></div>
      </div>

      <div class="quote">"${quote}"</div>

      <h3 style="font-size:10px;margin-top:14px;">DEINE VOKABELN IN DIESER ÜBUNG</h3>
      <div class="vocab-list">
        ${state.sessionLog.map(l=>`
          <div class="vocab-row">
            <span class="mark">${l.result==='correct'?'✅':l.result==='almost'?'🟡':'❌'}</span>
            <span style="flex:1;text-align:left;">${escapeHtml(l.prompt)}</span>
            <span style="flex:1;text-align:right;">${escapeHtml(l.correct)}</span>
          </div>
        `).join("")}
      </div>

      ${mistakes.length>0 ? `
      <h3 style="font-size:10px;margin-top:14px;">FEHLERBERICHT</h3>
      <div class="vocab-list">
        ${mistakes.map(l=>`
          <div class="mistake-row">
            ${escapeHtml(l.prompt)} &rarr; richtig: <b>${escapeHtml(l.correct)}</b>${l.userInput?` (du: "${escapeHtml(l.userInput)}")`:""}
          </div>
        `).join("")}
      </div>` : `<p class="center-text muted" style="margin-top:10px;">Keine Fehler &ndash; perfekt! 🎉</p>`}

      <p style="text-align:center;margin-top:14px;font-family:var(--content-font);">
        Neuer Kontostand: <strong>🪙 ${state.coins}</strong>
      </p>
    </div>

    <button class="btn secondary" id="share-btn" style="margin-top:14px;">📤 PER WHATSAPP TEILEN</button>
    <div style="height:10px;"></div>
    <button class="btn gold" id="shop-btn">🛒 MÜNZEN IM SHOP AUSGEBEN</button>
    <div style="height:10px;"></div>
    <button class="btn" id="retry-btn">↻ NOCHMAL ÜBEN</button>
    <div style="height:10px;"></div>
    <button class="btn danger" id="menu-btn">✕ ZUM MENÜ</button>
  `;

  document.getElementById('share-btn').addEventListener('click', shareCertificateWhatsApp);
  document.getElementById('shop-btn').addEventListener('click', ()=>{ state.screen="shop"; state.shopReturnTo="certificate"; render(); });
  document.getElementById('retry-btn').addEventListener('click', startGame);
  document.getElementById('menu-btn').addEventListener('click', ()=>{ state.screen="start"; render(); });
}

/* ---------------------------------------------------
   SHOP
--------------------------------------------------- */
function renderShop(){
  app.innerHTML = `
    ${renderHeader("Tausche Münzen gegen Items")}
    ${playerBadgeHtml()}
    <div class="balance-bar">🪙 Kontostand: ${state.coins}</div>

    <div class="panel">
      <h3 style="font-size:12px;margin-bottom:10px;">SHOP</h3>
      <div class="shop-grid">
        ${SHOP_ITEMS.map(item=>`
          <div class="shop-item">
            <span class="slot-icon">${item.icon}</span>
            <span class="slot-name">${item.name}</span>
            <span class="price">🪙 ${item.price}</span>
            <button class="btn buy-btn" data-item="${item.id}" ${state.coins < item.price ? 'disabled' : ''}>KAUFEN</button>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="panel">
      <h3 style="font-size:11px;margin-bottom:8px;">DEIN INVENTAR</h3>
      ${inventoryHtml(state.inventory)}
    </div>

    <button class="btn danger" id="back-btn">✕ ZURÜCK</button>
  `;

  document.querySelectorAll('.buy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.item;
      const item = shopItemById(id);
      if(!item || state.coins < item.price) return;
      state.coins -= item.price;
      state.inventory[id] = (state.inventory[id]||0) + 1;
      saveProgress();
      render();
    });
  });
  document.getElementById('back-btn').addEventListener('click', ()=>{
    state.screen = state.shopReturnTo || "start";
    render();
  });
}

render();
</script>
